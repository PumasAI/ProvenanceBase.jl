name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@f2ffb6d84cd0eae8a4be661aa23ee0fa250406d5 # v1.20.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
